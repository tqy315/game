{% extends 'mainsite/base.html' %}
{% block title %}登录 - 国风华容道{% endblock %}
{% block content %}
<div id="login-screen" class="screen active">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">華</div>
      <h1>国风华容道</h1>
      <p class="subtitle">中华传统文化拼图之旅</p>
    </div>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="post" class="login-form" novalidate>
      {% csrf_token %}
      <div class="input-group"><label for="id_username">用户名</label><input type="text" name="username" placeholder="请输入用户名" class="input-field" required id="id_username"></div>
      <div class="input-group"><label for="id_password">密码</label><input type="password" name="password" placeholder="请输入密码" class="input-field" required id="id_password"></div>
      <button type="submit" class="btn btn-primary btn-large">登 录</button>
    </form>
    <p class="login-hint">还没有账号？<a href="{% url 'register' %}" class="link-gold">立即注册</a></p>
  </div>
</div>
{% endblock %}
