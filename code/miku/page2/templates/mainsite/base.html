<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}国风华容道{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",sans-serif;background:#fef9f0;color:#3d2b1f;min-height:100vh;overflow-x:hidden}
    #bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
    #app{position:relative;z-index:1;min-height:100vh}
    .btn{display:inline-block;padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;transition:all .2s;text-decoration:none}
    .btn-primary{background:linear-gradient(135deg,#c41e3a,#a01830);color:#fff}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(196,30,58,.4)}
    .btn-gold{background:linear-gradient(135deg,#b8860b,#8b6914);color:#fff}
    .btn-outline{border:2px solid #c41e3a;color:#c41e3a;background:transparent}
    .btn-large{padding:14px 40px;font-size:17px}
    .btn-small{padding:6px 14px;font-size:13px}
    .link-gold{color:#b8860b;text-decoration:none;font-weight:600}
    .link-gold:hover{text-decoration:underline}
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% csrf_token %}
  <canvas id="bg-canvas"></canvas>
  <div id="app">{% block content %}{% endblock %}</div>

  <script>
    const URLS = {
      menu: '{% url "menu" %}',
      subtopic: '{% url "subtopic" %}',
      game: '{% url "game" %}',
      complete: '{% url "complete" %}',
      saveRecord: '{% url "save_record" %}',
      login: '{% url "login" %}',
      daily: '{% url "daily" %}',
    };
    const CSRF_TOKEN = document.querySelector('[name=csrfmiddlewaretoken]').value;
  </script>
  <script src="{% static 'js/data.js' %}"></script>
  <script src="{% static 'js/puzzle.js' %}"></script>
  <script src="{% static 'js/sound.js' %}"></script>
  <script src="{% static 'js/app.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
