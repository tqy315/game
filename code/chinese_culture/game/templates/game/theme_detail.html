{% extends 'game/base.html' %}

{% block content %}
<section class="theme-header" style="background: {{ theme.bg_gradient }};">
    <a href="{% url 'index' %}" class="back-btn">← 返回首页</a>
    <div class="theme-header-content">
        <span class="theme-header-icon">{{ theme.icon }}</span>
        <h1 class="theme-header-title">{{ theme.name }}</h1>
        <p class="theme-header-desc">{{ theme.description }}</p>
    </div>
</section>

<section class="levels-section">
    <h2 class="section-title">
        <span class="title-decoration">◆</span>
        选择关卡 <span class="level-count">共 {{ theme.items|length }} 关</span>
        <span class="title-decoration">◆</span>
    </h2>
    <div class="levels-grid">
        {% for item in theme.items %}
        <div class="level-card-wrapper">
            <a href="{% url 'puzzle' theme.id forloop.counter0 %}" class="level-card">
                <div class="level-number">{{ forloop.counter }}</div>
                <div class="level-info">
                    <h3 class="level-name">{{ item.name }}</h3>
                    <p class="level-desc">{{ item.desc }}</p>
                </div>
                <div class="level-arrow">▶</div>
            </a>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
