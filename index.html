<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>华容道 — 中华文化拼图</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 粒子背景 -->
  <canvas id="bg-canvas"></canvas>

  <div id="app">

    <!-- ===== 登录界面 ===== -->
    <div id="login-screen" class="screen active">
      <div class="login-card">
        <div class="logo-area">
          <div class="logo-icon">華</div>
          <h1>华容道</h1>
          <p class="subtitle">中华文化拼图之旅</p>
        </div>
        <div class="login-form">
          <div class="input-group">
            <label for="username">玩家昵称</label>
            <input type="text" id="username" placeholder="请输入你的昵称…" maxlength="12" autocomplete="off">
          </div>
          <button id="btn-login" class="btn btn-primary btn-large">开始旅程</button>
        </div>
        <p class="login-hint">输入昵称即可开始，数据将保存在本地</p>
      </div>
    </div>

    <!-- ===== 主菜单 ===== -->
    <div id="menu-screen" class="screen">
      <header class="top-bar">
        <div class="user-badge" id="user-badge-menu">
          <span class="avatar">🧩</span>
          <span class="nick" id="nick-menu"></span>
          <span class="points-display">积分: <strong id="points-menu">0</strong></span>
        </div>
        <nav class="top-nav">
          <button class="btn btn-text" data-screen="history-screen">📋 历史记录</button>
          <button class="btn btn-text" data-screen="settings-screen">⚙️ 设置</button>
          <button class="btn btn-text" id="btn-logout">退出</button>
        </nav>
      </header>

      <main class="menu-content">
        <section class="section-theme">
          <h2>选择文化主题</h2>
          <div class="theme-grid" id="theme-grid">
            <!-- JS 动态生成 -->
          </div>
        </section>

        <section class="section-difficulty">
          <h2>选择难度</h2>
          <div class="difficulty-options" id="difficulty-options">
            <label class="diff-card">
              <input type="radio" name="difficulty" value="3" checked>
              <div class="diff-inner">
                <span class="diff-size">3 × 3</span>
                <span class="diff-label">入门</span>
              </div>
            </label>
            <label class="diff-card">
              <input type="radio" name="difficulty" value="4">
              <div class="diff-inner">
                <span class="diff-size">4 × 4</span>
                <span class="diff-label">进阶</span>
              </div>
            </label>
            <label class="diff-card">
              <input type="radio" name="difficulty" value="5">
              <div class="diff-inner">
                <span class="diff-size">5 × 5</span>
                <span class="diff-label">大师</span>
              </div>
            </label>
          </div>
        </section>

        <button id="btn-start" class="btn btn-primary btn-large">开始挑战</button>

        <!-- 奖励展示 -->
        <section class="section-rewards">
          <h2>成就徽章</h2>
          <div class="rewards-row" id="rewards-row">
            <!-- JS 动态生成 -->
          </div>
        </section>
      </main>
    </div>

    <!-- ===== 游戏界面 ===== -->
    <div id="game-screen" class="screen">
      <div class="game-layout">
        <!-- 左侧：拼图区域 -->
        <div class="game-board-area">
          <div class="board-header">
            <button class="btn btn-outline btn-sm" id="btn-back-menu">← 返回</button>
            <span class="board-theme-name" id="game-theme-name"></span>
            <span class="board-diff" id="game-diff"></span>
          </div>
          <div class="board-wrapper">
            <div class="puzzle-board" id="puzzle-board">
              <!-- JS 动态生成 -->
            </div>
          </div>
          <div class="board-controls">
            <button class="btn btn-outline" id="btn-hint">💡 提示</button>
            <button class="btn btn-outline" id="btn-shuffle">🔀 重新洗牌</button>
            <button class="btn btn-outline" id="btn-show-preview">🖼️ 查看原图</button>
          </div>
        </div>

        <!-- 右侧：信息面板 -->
        <div class="game-info-area">
          <div class="info-card">
            <div class="info-row">
              <span class="info-label">⏱️ 用时</span>
              <span class="info-value" id="game-timer">00:00</span>
            </div>
            <div class="info-row">
              <span class="info-label">👆 步数</span>
              <span class="info-value" id="game-moves">0</span>
            </div>
            <div class="info-row">
              <span class="info-label">💡 提示次数</span>
              <span class="info-value" id="game-hints-used">0</span>
            </div>
            <div class="info-row">
              <span class="info-label">📊 预计得分</span>
              <span class="info-value" id="game-score-estimate">—</span>
            </div>
          </div>

          <div class="preview-mini" id="preview-mini">
            <p class="preview-label">目标图案</p>
            <canvas id="preview-canvas" width="150" height="150"></canvas>
          </div>

          <div class="move-history" id="move-history">
            <p class="move-label">操作记录</p>
            <div class="move-list" id="move-list"></div>
          </div>
        </div>
      </div>

      <!-- 提示弹窗 -->
      <div class="hint-overlay" id="hint-overlay">
        <div class="hint-box" id="hint-box">
          <p id="hint-text"></p>
        </div>
      </div>
    </div>

    <!-- ===== 完成界面 ===== -->
    <div id="complete-screen" class="screen">
      <div class="complete-card">
        <div class="complete-header">
          <div class="trophy">🏆</div>
          <h2>恭喜通关！</h2>
          <p class="complete-theme-name" id="complete-theme-name"></p>
        </div>
        <div class="complete-stats" id="complete-stats">
          <!-- JS 生成 -->
        </div>
        <div class="complete-culture" id="complete-culture">
          <h3>文化介绍</h3>
          <div class="culture-content" id="culture-content"></div>
        </div>
        <div class="complete-actions">
          <button class="btn btn-primary" id="btn-next-puzzle">下一关</button>
          <button class="btn btn-outline" id="btn-menu-from-complete">返回菜单</button>
        </div>
      </div>
    </div>

    <!-- ===== 历史记录 ===== -->
    <div id="history-screen" class="screen">
      <header class="top-bar">
        <button class="btn btn-outline btn-sm" id="btn-back-from-history">← 返回菜单</button>
        <h2>历史记录</h2>
        <div></div>
      </header>
      <main class="history-content">
        <div class="history-grid" id="history-grid">
          <p class="empty-hint" id="history-empty">还没有完成任何拼图，快去挑战吧！</p>
        </div>
      </main>
    </div>

    <!-- ===== 设置界面 ===== -->
    <div id="settings-screen" class="screen">
      <header class="top-bar">
        <button class="btn btn-outline btn-sm" id="btn-back-from-settings">← 返回菜单</button>
        <h2>设置</h2>
        <div></div>
      </header>
      <main class="settings-content">
        <div class="settings-card">
          <div class="setting-row">
            <span>音效</span>
            <label class="toggle">
              <input type="checkbox" id="setting-sound" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="setting-row">
            <span>动画效果</span>
            <label class="toggle">
              <input type="checkbox" id="setting-animation" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="setting-row">
            <span>高亮提示移动</span>
            <label class="toggle">
              <input type="checkbox" id="setting-highlight-hint" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="settings-card">
          <h3>数据管理</h3>
          <button class="btn btn-outline btn-danger" id="btn-reset-data">重置所有数据</button>
          <p class="setting-hint">这将清除所有积分、历史记录和个人设置</p>
        </div>
        <div class="settings-card">
          <h3>关于</h3>
          <p>华容道 · 中华文化拼图 v1.0</p>
          <p>通过滑动拼图游戏，领略中华优秀传统文化的魅力。</p>
          <p>提示系统基于广度优先搜索（BFS）算法。</p>
        </div>
      </main>
    </div>

  </div>

  <!-- 引入 JS 模块 -->
  <script src="js/data.js"></script>
  <script src="js/puzzle.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
