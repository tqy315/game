<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}华容道{% endblock %}</title>
  <style>
    :root {
      --bg-deep: #f5f3ee;
      --bg-card: #ffffff;
      --bg-card-hover: #faf8f4;
      --gold: #b8860b;
      --gold-light: #d4a017;
      --red: #c41e3a;
      --red-dark: #8b0000;
      --red-light: #e8455b;
      --cream: #faf7f0;
      --text: #333333;
      --text-dim: #888888;
      --border: #e0ddd6;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: var(--gold); text-decoration: none; }
    a:hover { color: var(--gold-light); }

    /* Top bar */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; border-bottom: 1px solid var(--border);
      gap: 16px; flex-wrap: wrap;
      background: var(--bg-card);
    }
    .top-bar h2 { color: var(--gold); font-size: 20px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 24px; border: none; border-radius: var(--radius-sm);
      font-size: 15px; font-family: inherit; cursor: pointer;
      transition: all var(--transition); white-space: nowrap; text-decoration: none;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary {
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: #fff; font-weight: bold; letter-spacing: 1px;
    }
    .btn-primary:hover { background: linear-gradient(135deg, var(--red-light), var(--red)); box-shadow: 0 4px 20px rgba(196,30,58,0.4); }
    .btn-outline {
      background: transparent; color: var(--gold); border: 1px solid var(--gold);
    }
    .btn-outline:hover { background: rgba(184,134,11,0.06); }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .btn-danger { border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: rgba(196,30,58,0.08); }

    /* Content area */
    .content {
      max-width: 960px; margin: 0 auto; padding: 24px; width: 100%;
    }

    /* Cards */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      transition: all var(--transition);
      box-shadow: var(--shadow);
    }
    .card:hover { border-color: var(--gold); }

    /* Empty state */
    .empty-hint { color: var(--text-dim); text-align: center; padding: 48px; grid-column: 1 / -1; }

    /* Toggle */
    .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle input { display: none; }
    .toggle-slider {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc; border-radius: 24px;
      cursor: pointer; transition: var(--transition);
    }
    .toggle-slider::before {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; transition: var(--transition);
    }
    .toggle input:checked + .toggle-slider { background: var(--red); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

    /* Nav */
    .nav-links { display: flex; gap: 8px; }
    .nav-links a { font-size: 14px; color: var(--text-dim); padding: 6px 12px; border-radius: var(--radius-sm); transition: all var(--transition); }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); background: rgba(184,134,11,0.08); }

    /* Messages */
    .messages { list-style: none; margin-bottom: 16px; }
    .messages li { padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 8px; }
    .messages .success { background: rgba(40,167,69,0.1); color: #1e7e34; border: 1px solid rgba(40,167,69,0.25); }
    .messages .error { background: rgba(220,53,69,0.1); color: #bd2130; border: 1px solid rgba(220,53,69,0.25); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #aaa; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .content { animation: fadeIn 0.4s ease; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <header class="top-bar">
    <div>
      <a href="{% url 'history_list' %}" style="font-size:20px;color:var(--gold);font-weight:bold;">华容道</a>
    </div>
    <nav class="nav-links">
      <a href="{% url 'history_list' %}" {% if request.resolver_match.url_name == 'history_list' %}class="active"{% endif %}>📋 历史记录</a>
      <a href="{% url 'settings' %}" {% if request.resolver_match.url_name == 'settings' %}class="active"{% endif %}>⚙️ 设置</a>
    </nav>
  </header>

  {% if messages %}
  <div class="content">
    <ul class="messages">
      {% for msg in messages %}<li class="{{ msg.tags }}">{{ msg }}</li>{% endfor %}
    </ul>
  </div>
  {% endif %}

  {% block content %}{% endblock %}

  {% block extra_js %}{% endblock %}
</body>
</html>
