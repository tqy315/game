<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}国风华容道{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    /* 关键内联样式兜底 */
    :root { --bg-warm: #fef9f0; --gold: #b8860b; --red: #c41e3a; --red-dark: #8b1a1a; --text: #3d2b1f; --text-dim: #8b7355; --border: #e0d5c7; }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:"Microsoft YaHei","PingFang SC",sans-serif; background:var(--bg-warm); color:var(--text); min-height:100vh; overflow-x:hidden; }
    #bg-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
    #app { position:relative; z-index:1; }
    .btn { display:inline-flex; align-items:center; justify-content:center; padding:10px 24px; border:none; border-radius:24px; font-size:14px; cursor:pointer; }
    .btn-primary { background:linear-gradient(135deg, var(--red), var(--red-dark)); color:#fff; font-weight:bold; letter-spacing:2px; }
    .btn-large { padding:16px 56px; font-size:20px; border-radius:30px; }
    a { text-decoration:none; color:inherit; }
    .link-gold { color:var(--gold); font-weight:500; }
    .input-group { margin-bottom:24px; text-align:left; }
    .input-group label { display:block; margin-bottom:8px; color:var(--text-dim); font-size:13px; }
    .input-group input { width:100%; padding:14px 18px; border-radius:24px; border:2px solid var(--border); background:var(--bg-warm); color:var(--text); font-size:16px; outline:none; }
    .input-group input:focus { border-color:var(--gold); background:#fff; }
    .login-card { background:#fff; border-radius:12px; padding:56px 48px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.06); max-width:440px; width:90%; margin:auto; }
    .logo-icon { font-size:72px; color:var(--red); margin-bottom:16px; }
    .login-card h1 { font-size:38px; color:var(--red-dark); letter-spacing:8px; margin-bottom:8px; }
    .subtitle { color:var(--text-dim); font-size:14px; margin-bottom:40px; }
    .top-bar { display:flex; align-items:center; justify-content:space-between; padding:14px 32px; background:#fff; border-bottom:1px solid var(--border); }
    .top-nav { display:flex; gap:6px; }
    .btn-text { background:transparent; color:var(--text-dim); }
    .btn-outline { background:transparent; color:var(--gold); border:1px solid var(--gold); }
    .btn-sm { padding:6px 14px; font-size:13px; }
    .screen { display:none; }
    .screen.active { display:flex; flex-direction:column; min-height:100vh; }
    #login-screen { justify-content:center; align-items:center; background:linear-gradient(180deg,#fef5e7 0%,#fdf0dc 50%,#fef9f0 100%); }
    #menu-screen .menu-content { flex:1; padding:32px 28px 40px; max-width:1050px; margin:0 auto; width:100%; }
    #menu-screen h2 { font-size:20px; margin-bottom:16px; padding-left:12px; border-left:3px solid var(--red); }
    .menu-main-row { display:flex; gap:28px; align-items:flex-start; margin-bottom:28px; }
    .section-theme { flex:1; min-width:0; }
    .section-side { width:240px; flex-shrink:0; display:flex; flex-direction:column; gap:20px; }
    .theme-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
    .theme-card { background:#fff; border:2px solid var(--border); border-radius:12px; padding:16px 12px; cursor:pointer; text-align:center; }
    .theme-card:hover { border-color:var(--gold); transform:translateY(-3px); }
    .theme-card.selected { border-color:var(--red); }
    .theme-preview { width:100%; aspect-ratio:1; border-radius:8px; margin-bottom:10px; object-fit:cover; }
    .theme-name { font-size:14px; font-weight:600; }
    .theme-desc { font-size:11px; color:var(--text-dim); margin-top:4px; }
    .difficulty-options { display:flex; flex-direction:column; gap:10px; }
    .diff-card { cursor:pointer; }
    .diff-card input { display:none; }
    .diff-inner { display:flex; align-items:center; gap:14px; padding:16px 18px; background:#fff; border:2px solid var(--border); border-radius:12px; }
    .diff-card input:checked+.diff-inner { border-color:var(--red); background:#fef5f5; }
    .diff-icon { font-size:28px; }
    .diff-size { font-size:18px; font-weight:bold; display:block; }
    .diff-label { font-size:12px; color:var(--text-dim); }
    .rewards-row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .reward-badge { padding:12px 16px; background:#fff; border-radius:16px; border:1px solid var(--border); text-align:center; min-width:90px; }
    .reward-badge.locked { opacity:0.5; }
    .reward-badge.earned { border-color:var(--gold); background:#fffdf5; }
    .badge-icon { font-size:24px; }
    .badge-name { font-size:12px; font-weight:600; margin-top:4px; }
    .badge-points { font-size:11px; color:var(--text-dim); }
    .user-badge { display:flex; align-items:center; gap:10px; background:var(--bg-warm); padding:8px 20px; border-radius:24px; border:1px solid var(--border); }
    .nick { font-weight:bold; }
    .points-display { color:var(--gold); font-size:13px; }
    @media (max-width:900px) { .menu-main-row { flex-direction:column; } .section-side { width:100%; flex-direction:row; } }
    @media (max-width:768px) { .theme-grid { grid-template-columns:repeat(2,1fr); } }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% csrf_token %}
  <canvas id="bg-canvas"></canvas>
  <div id="app">
    {% block content %}{% endblock %}
  </div>

  <script>
    // Django 全局配置
    const URLS = {
      menu: '{% url "menu" %}',
      subtopic: '{% url "subtopic" %}',
      game: '{% url "game" %}',
      complete: '{% url "complete" %}',
      saveRecord: '{% url "save_record" %}',
      login: '{% url "login" %}',
    };
    const CSRF_TOKEN = document.querySelector('[name=csrfmiddlewaretoken]').value;
  </script>
  <script src="{% static 'js/data.js' %}"></script>
  <script src="{% static 'js/puzzle.js' %}"></script>
  <script src="{% static 'js/app.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
