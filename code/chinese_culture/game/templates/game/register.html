{% extends 'game/base.html' %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <div class="auth-icon">📝</div>
        <h1 class="auth-title">注册</h1>
        <p class="auth-subtitle">创建账号，开启中华文化拼图之旅</p>

        <form method="POST" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="nickname">昵称</label>
                <input type="text" id="nickname" name="nickname" placeholder="给自己起个名字吧" required>
            </div>
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="用于登录" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="至少4位" required minlength="4">
            </div>
            <div class="form-group">
                <label for="password2">确认密码</label>
                <input type="password" id="password2" name="password2" placeholder="再次输入密码" required minlength="4">
            </div>
            <button type="submit" class="auth-btn">注 册</button>
        </form>

        <p class="auth-switch">
            已有账号？<a href="{% url 'login' %}">立即登录 →</a>
        </p>
    </div>
</section>
{% endblock %}
